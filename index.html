<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="訂單管理">
<meta name="theme-color" content="#2d4a3e">
<title>塑膠袋訂單管理</title>
<link rel="manifest" href="https://styledreamer721-beep.github.io/order-app/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --accent: #2d4a3e;
  --accent2: #4a7c59;
  --accent-light: #e8f0eb;
  --text: #1a1a1a;
  --text2: #666;
  --text3: #999;
  --border: #e0dfd8;
  --danger: #c0392b;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.header { background: var(--accent); color: white; padding: 16px 20px 12px; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.5px; }
.header-sub { font-size: 11px; opacity: 0.6; margin-top: 2px; font-family: 'DM Mono', monospace; }
.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 58px; z-index: 99; }
.tab { flex: 1; padding: 12px 8px; text-align: center; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab svg { display: block; margin: 0 auto 3px; width: 18px; height: 18px; }
.panel { display: none; padding: 16px; padding-bottom: 80px; }
.panel.active { display: block; }
.card { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; }
.field input, .field textarea {
  padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  font-size: 15px; font-family: 'Noto Sans TC', sans-serif; background: var(--surface);
  color: var(--text); transition: border-color 0.2s; width: 100%;
}
.field input:focus, .field textarea:focus { outline: none; border-color: var(--accent2); }
.field textarea { min-height: 70px; resize: vertical; }
.scan-btn {
  width: 100%; padding: 14px; background: var(--accent); color: white;
  border: none; border-radius: var(--radius); font-size: 15px; font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif; cursor: pointer; display: flex;
  align-items: center; justify-content: center; gap: 8px; margin-bottom: 16px;
}
.scan-btn svg { width: 22px; height: 22px; }
.scan-btn:active { opacity: 0.85; transform: scale(0.99); }
.save-btn {
  width: 100%; padding: 14px; background: var(--accent2); color: white;
  border: none; border-radius: var(--radius); font-size: 15px; font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif; cursor: pointer; margin-top: 4px;
}
.save-btn:active { opacity: 0.85; }
.divider { display: flex; align-items: center; gap: 10px; margin: 14px 0; }
.divider span { font-size: 11px; color: var(--text3); white-space: nowrap; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.preview-box { background: var(--surface2); border-radius: var(--radius-sm); border: 1.5px dashed var(--border); padding: 12px; margin-bottom: 14px; }
.preview-box img { width: 100%; border-radius: 6px; max-height: 180px; object-fit: cover; }
.preview-label { font-size: 11px; color: var(--text3); text-align: center; margin-top: 8px; }
.ocr-result { font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; margin-top: 8px; line-height: 1.6; max-height: 80px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 8px; text-align: center; }
.stat-num { font-size: 24px; font-weight: 700; color: var(--accent); font-family: 'DM Mono', monospace; }
.stat-label { font-size: 10px; color: var(--text3); margin-top: 2px; }
.search-wrap { position: relative; margin-bottom: 12px; }
.search-wrap input { width: 100%; padding: 12px 16px 12px 42px; border: 1.5px solid var(--border); border-radius: var(--radius); font-size: 15px; background: var(--surface); font-family: 'Noto Sans TC', sans-serif; color: var(--text); }
.search-wrap input:focus { outline: none; border-color: var(--accent2); }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text3); width: 18px; height: 18px; }
.autocomplete { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); z-index: 50; overflow: hidden; box-shadow: var(--shadow); }
.ac-item { padding: 11px 16px; font-size: 14px; cursor: pointer; border-bottom: 1px solid var(--border); color: var(--text); }
.ac-item:last-child { border-bottom: none; }
.ac-item:active, .ac-item.sel { background: var(--accent-light); }
.ac-match { color: var(--accent2); font-weight: 700; }
.order-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 10px; }
.order-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.order-customer { font-size: 16px; font-weight: 700; color: var(--text); }
.order-num { display: inline-block; font-size: 10px; font-family: 'DM Mono', monospace; background: var(--accent-light); color: var(--accent); padding: 2px 8px; border-radius: 20px; margin-left: 6px; vertical-align: middle; }
.order-date { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
.order-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.order-field { font-size: 12px; }
.order-field-key { color: var(--text3); }
.order-field-val { color: var(--text); font-weight: 500; }
.order-note { font-size: 12px; color: var(--text2); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); grid-column: 1/-1; }
.del-btn { background: none; border: none; cursor: pointer; padding: 4px; color: var(--text3); }
.del-btn:active { color: var(--danger); }
.empty { text-align: center; padding: 48px 20px; color: var(--text3); }
.empty svg { width: 48px; height: 48px; margin: 0 auto 12px; opacity: 0.3; display: block; }
.empty p { font-size: 14px; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--accent); color: white; padding: 12px 24px; border-radius: 100px; font-size: 14px; font-weight: 500; z-index: 999; transition: transform 0.3s ease; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }
.scanning { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
.scanning.show { display: flex; }
.scanning p { color: white; font-size: 15px; }
.spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.sync-bar { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 11px; color: var(--text3); padding: 6px; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
.sync-dot.ok { background: var(--accent2); }
.sync-dot.err { background: var(--danger); }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <div>
      <h1>📦 塑膠袋訂單管理</h1>
      <div class="header-sub">PLASTIC BAG ORDER SYSTEM</div>
    </div>
    <div id="sync-status" style="font-size:11px;opacity:0.7;text-align:right"></div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('add')" id="tab-add">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    新增訂單
  </div>
  <div class="tab" onclick="switchTab('search')" id="tab-search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    查詢訂單
  </div>
</div>

<div class="panel active" id="panel-add">
  <div class="card">
    <button class="scan-btn" onclick="triggerScan()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
      拍照自動辨識
    </button>
    <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)">
    <div id="preview-box" class="preview-box" style="display:none">
      <img id="preview-img" src="" alt="預覽">
      <div id="ocr-text" class="ocr-result"></div>
      <div class="preview-label">已辨識文字，請確認下方欄位</div>
    </div>
  </div>

  <div class="divider"><span>或手動填寫</span></div>

  <div class="card">
    <div class="form-row">
      <div class="field">
        <label>客戶名稱 *</label>
        <input type="text" id="f-customer" placeholder="客戶名稱">
      </div>
      <div class="field">
        <label>日期 *</label>
        <input type="date" id="f-date">
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>單號</label>
        <input type="text" id="f-ordernum" placeholder="單號">
      </div>
      <div class="field">
        <label>材料 *</label>
        <input type="text" id="f-material" placeholder="HDPE / LDPE / PP">
      </div>
    </div>
    <div class="field" style="margin-bottom:10px">
      <label>袋子尺寸（長cm × 寬cm × 厚μm）</label>
      <div class="form-row triple" style="margin-bottom:0">
        <input type="number" id="f-len" placeholder="長">
        <input type="number" id="f-wid" placeholder="寬">
        <input type="number" id="f-thk" placeholder="厚">
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>數量（個）</label>
        <input type="number" id="f-qty" placeholder="5000">
      </div>
      <div class="field">
        <label>重量（kg）</label>
        <input type="number" id="f-weight" step="0.01" placeholder="25.5">
      </div>
    </div>
    <div class="field" style="margin-bottom:12px">
      <label>備註</label>
      <textarea id="f-note" placeholder="顏色、印刷、特殊需求..."></textarea>
    </div>
    <button class="save-btn" onclick="saveOrder()">儲存訂單</button>
  </div>
</div>

<div class="panel" id="panel-search">
  <div class="stats">
    <div class="stat"><div class="stat-num" id="stat-total">-</div><div class="stat-label">總訂單</div></div>
    <div class="stat"><div class="stat-num" id="stat-customers">-</div><div class="stat-label">客戶數</div></div>
    <div class="stat"><div class="stat-num" id="stat-month">-</div><div class="stat-label">本月</div></div>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search-input" placeholder="輸入客戶名稱搜尋..." oninput="onSearch()" onkeydown="onSearchKey(event)" autocomplete="off">
    <div class="autocomplete" id="ac-list" style="display:none"></div>
  </div>
  <div id="order-list"><div class="empty"><p>載入中...</p></div></div>
</div>

<div class="scanning" id="scanning">
  <div class="spinner"></div>
  <p id="scanning-msg">辨識中，請稍候...</p>
</div>

<div class="toast" id="toast">✓ 訂單已儲存</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxnM6Sp3M9Y38EjMonnxvlbkcfaPBSBCLmBEozWAemlDAeD7aseK3pomiaB2-KUxGar/exec';
let orders = [];
let acItems = [], acIdx = -1;

// ── API calls ──
async function apiGet() {
  const res = await fetch(API + '?action=getOrders');
  const data = await res.json();
  return data.orders || [];
}

async function apiAdd(order) {
  const res = await fetch(API, {
    method: 'POST',
    body: JSON.stringify({ action: 'addOrder', order })
  });
  return await res.json();
}

async function apiDelete(id) {
  const res = await fetch(API, {
    method: 'POST',
    body: JSON.stringify({ action: 'deleteOrder', id })
  });
  return await res.json();
}

// ── Tabs ──
function switchTab(tab) {
  ['add','search'].forEach(t => {
    document.getElementById('panel-'+t).classList.toggle('active', t===tab);
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  if(tab==='search') loadAndRender();
}

// ── Load & render ──
async function loadAndRender() {
  setSyncStatus('載入中...', '');
  try {
    orders = await apiGet();
    updateStats();
    renderOrders(document.getElementById('search-input').value.trim());
    setSyncStatus('已同步 Google Sheets', 'ok');
  } catch(e) {
    setSyncStatus('連線失敗', 'err');
    renderOrders('');
  }
}

function setSyncStatus(msg, state) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.style.color = state==='err' ? '#ff6b6b' : state==='ok' ? '#a8d5b5' : 'rgba(255,255,255,0.6)';
}

function updateStats() {
  const now = today().slice(0,7);
  document.getElementById('stat-total').textContent = orders.length;
  document.getElementById('stat-customers').textContent = new Set(orders.map(o=>o.customer)).size;
  document.getElementById('stat-month').textContent = orders.filter(o=>String(o.date).startsWith(now)).length;
}

// ── Save ──
async function saveOrder() {
  const customer = document.getElementById('f-customer').value.trim();
  const date = document.getElementById('f-date').value;
  const material = document.getElementById('f-material').value.trim();
  if(!customer || !date || !material) { alert('請填寫客戶名稱、日期、材料'); return; }

  const order = {
    id: Date.now(),
    customer, date,
    orderNum: document.getElementById('f-ordernum').value.trim(),
    material,
    len: document.getElementById('f-len').value,
    wid: document.getElementById('f-wid').value,
    thk: document.getElementById('f-thk').value,
    qty: document.getElementById('f-qty').value,
    weight: document.getElementById('f-weight').value,
    note: document.getElementById('f-note').value.trim()
  };

  showScanning('儲存中...');
  try {
    await apiAdd(order);
    hideScanning();
    ['f-customer','f-ordernum','f-material','f-len','f-wid','f-thk','f-qty','f-weight','f-note'].forEach(id => document.getElementById(id).value='');
    document.getElementById('f-date').value = today();
    document.getElementById('preview-box').style.display = 'none';
    showToast('✓ 訂單已儲存到 Google Sheets');
  } catch(e) {
    hideScanning();
    showToast('❌ 儲存失敗，請檢查網路');
  }
}

// ── Delete ──
async function delOrder(id) {
  if(!confirm('確定要刪除？')) return;
  showScanning('刪除中...');
  try {
    await apiDelete(id);
    hideScanning();
    loadAndRender();
  } catch(e) {
    hideScanning();
    showToast('❌ 刪除失敗');
  }
}

// ── Search & autocomplete ──
function onSearch() {
  const kw = document.getElementById('search-input').value.trim();
  renderOrders(kw);
  if(!kw) { hideAC(); return; }
  const names = [...new Set(orders.map(o=>o.customer))].filter(n=>n.includes(kw));
  if(!names.length || (names.length===1 && names[0]===kw)) { hideAC(); return; }
  acItems = names.slice(0,8); acIdx = -1;
  const list = document.getElementById('ac-list');
  list.innerHTML = acItems.map((n,i) => {
    const idx = n.indexOf(kw);
    const hl = idx>=0 ? n.slice(0,idx)+'<span class="ac-match">'+n.slice(idx,idx+kw.length)+'</span>'+n.slice(idx+kw.length) : n;
    return `<div class="ac-item" onmousedown="selectAC(${i})">${hl}</div>`;
  }).join('');
  list.style.display = 'block';
}

function onSearchKey(e) {
  const items = document.querySelectorAll('.ac-item');
  if(e.key==='ArrowDown') { acIdx=Math.min(acIdx+1,acItems.length-1); hlAC(items); e.preventDefault(); }
  else if(e.key==='ArrowUp') { acIdx=Math.max(acIdx-1,-1); hlAC(items); e.preventDefault(); }
  else if(e.key==='Enter'&&acIdx>=0) { selectAC(acIdx); e.preventDefault(); }
  else if(e.key==='Escape') hideAC();
}
function hlAC(items) { items.forEach((el,i)=>el.classList.toggle('sel',i===acIdx)); }
function selectAC(i) { document.getElementById('search-input').value=acItems[i]; hideAC(); renderOrders(acItems[i]); }
function hideAC() { document.getElementById('ac-list').style.display='none'; acIdx=-1; }
document.addEventListener('click', e => { if(!e.target.closest('.search-wrap')) hideAC(); });

function renderOrders(kw) {
  const filtered = kw ? orders.filter(o=>o.customer.includes(kw)) : orders;
  const list = document.getElementById('order-list');
  if(!filtered.length) {
    list.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>${kw?'查無符合訂單':'尚無訂單紀錄'}</p></div>`;
    return;
  }
  list.innerHTML = filtered.map(o => `
    <div class="order-card">
      <div class="order-top">
        <div>
          <span class="order-customer">${o.customer}</span>
          ${o.orderNum?`<span class="order-num">${o.orderNum}</span>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="order-date">${o.date}</span>
          <button class="del-btn" onmousedown="delOrder(${o.id})">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>
      <div class="order-fields">
        <div class="order-field"><span class="order-field-key">材料 </span><span class="order-field-val">${o.material}</span></div>
        ${o.len||o.wid||o.thk?`<div class="order-field"><span class="order-field-key">尺寸 </span><span class="order-field-val">${[o.len&&o.len+'cm',o.wid&&o.wid+'cm',o.thk&&o.thk+'μm'].filter(Boolean).join('×')}</span></div>`:''}
        ${o.qty?`<div class="order-field"><span class="order-field-key">數量 </span><span class="order-field-val">${Number(o.qty).toLocaleString()}個</span></div>`:''}
        ${o.weight?`<div class="order-field"><span class="order-field-key">重量 </span><span class="order-field-val">${o.weight}kg</span></div>`:''}
        ${o.note?`<div class="order-note">備註：${o.note}</div>`:''}
      </div>
    </div>
  `).join('');
}

// ── Photo / OCR ──
function triggerScan() { document.getElementById('file-input').click(); }

function handlePhoto(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('preview-img').src = ev.target.result;
    document.getElementById('preview-box').style.display = 'block';
    runOCR(file);
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function runOCR(file) {
  showScanning('辨識中，請稍候...');
  const load = () => {
    Tesseract.recognize(file, 'chi_tra+eng', { logger: ()=>{} })
      .then(({ data: { text } }) => {
        hideScanning();
        document.getElementById('ocr-text').textContent = text;
        parseOCR(text);
      }).catch(() => { hideScanning(); showToast('辨識失敗，請手動填寫'); });
  };
  if(window.Tesseract) { load(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
  s.onload = load;
  s.onerror = () => { hideScanning(); showToast('載入辨識引擎失敗'); };
  document.head.appendChild(s);
}

function parseOCR(text) {
  const full = text.split('\n').map(l=>l.trim()).filter(Boolean).join(' ');
  const custMatch = full.match(/客[戶户][\s:：]*([^\s,，。]+)/);
  if(custMatch) setField('f-customer', custMatch[1]);
  const numMatch = full.match(/單[號号][\s:：]*([A-Za-z0-9\-_]+)/);
  if(numMatch) setField('f-ordernum', numMatch[1]);
  for(const m of ['HDPE','LDPE','LLDPE','PP','PVC','PE','OPP','CPP','PET']) {
    if(full.toUpperCase().includes(m)) { setField('f-material', m); break; }
  }
  const dimMatch = full.match(/(\d+(?:\.\d+)?)\s*[×xX*]\s*(\d+(?:\.\d+)?)\s*[×xX*]\s*(\d+(?:\.\d+)?)/);
  if(dimMatch) { setField('f-len',dimMatch[1]); setField('f-wid',dimMatch[2]); setField('f-thk',dimMatch[3]); }
  else {
    const lm=full.match(/長[\s:：]*(\d+(?:\.\d+)?)/), wm=full.match(/寬[\s:：]*(\d+(?:\.\d+)?)/), tm=full.match(/厚[\s:：]*(\d+(?:\.\d+)?)/);
    if(lm) setField('f-len',lm[1]); if(wm) setField('f-wid',wm[1]); if(tm) setField('f-thk',tm[1]);
  }
  const qm=full.match(/數量[\s:：]*(\d+)|(\d+)\s*[個个pcs張]/i);
  if(qm) setField('f-qty', qm[1]||qm[2]);
  const wm2=full.match(/重量[\s:：]*(\d+(?:\.\d+)?)|(\d+(?:\.\d+)?)\s*[kK][gG]/);
  if(wm2) setField('f-weight', wm2[1]||wm2[2]);
  const dm=full.match(/(\d{4})[\-\/年](\d{1,2})[\-\/月](\d{1,2})/);
  if(dm) setField('f-date', `${dm[1]}-${dm[2].padStart(2,'0')}-${dm[3].padStart(2,'0')}`);
  showToast('辨識完成，請確認欄位');
}

function setField(id, val) { if(val) document.getElementById(id).value = val; }

// ── Utils ──
function today() { return new Date().toISOString().slice(0,10); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}
function showScanning(msg) {
  document.getElementById('scanning-msg').textContent = msg || '處理中...';
  document.getElementById('scanning').classList.add('show');
}
function hideScanning() { document.getElementById('scanning').classList.remove('show'); }

// ── Init ──
document.getElementById('f-date').value = today();
</script>
</body>
